---
- name: Setup Task Manager Environment
  hosts: local
  become: yes

  vars:
    app_user: "{{ ansible_user_id }}"
    app_base: /opt/app
    node_version: "20"
    blue_port: 3001

  tasks:
    - name: Install prerequisites
      apt:
        name: [curl, gnupg, rsync]
        state: present
        update_cache: yes

    - name: Add NodeSource GPG key
      shell: >
        curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
        | gpg --dearmor -o /etc/apt/keyrings/nodesource.gpg
      args:
        creates: /etc/apt/keyrings/nodesource.gpg

    - name: Add NodeSource repository
      shell: >
        echo "deb [signed-by=/etc/apt/keyrings/nodesource.gpg]
        https://deb.nodesource.com/node_{{ node_version }}.x nodistro main"
        | tee /etc/apt/sources.list.d/nodesource.list
      args:
        creates: /etc/apt/sources.list.d/nodesource.list

    - name: Install Node.js
      apt:
        name: nodejs
        state: present
        update_cache: yes

    - name: Install PM2 globally
      npm:
        name: pm2
        global: yes
        state: present

    - name: Install nginx
      apt:
        name: nginx
        state: present

    - name: Create app directories
      file:
        path: "{{ item }}"
        state: directory
        owner: "{{ app_user }}"
        mode: '0755'
      loop:
        - "{{ app_base }}/blue"
        - "{{ app_base }}/green"
        - "{{ app_base }}/logs"

    - name: Create active_slot file (default: blue)
      copy:
        content: "blue"
        dest: "{{ app_base }}/active_slot"
        force: no
        owner: "{{ app_user }}"
        mode: '0644'

    - name: Deploy nginx config
      template:
        src: ../nginx/app.conf.j2
        dest: /etc/nginx/sites-available/taskmanager
      vars:
        active_port: "{{ blue_port }}"

    - name: Enable taskmanager nginx site
      file:
        src: /etc/nginx/sites-available/taskmanager
        dest: /etc/nginx/sites-enabled/taskmanager
        state: link

    - name: Remove default nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Validate nginx config
      command: nginx -t
      changed_when: false

    - name: Start and enable nginx
      service:
        name: nginx
        state: started
        enabled: yes
