services:
  app-blue:
    build: .
    image: task-manager:latest
    container_name: app-blue
    environment:
      - PORT=3000
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks: [appnet]

  app-green:
    build: .
    image: task-manager:latest
    container_name: app-green
    environment:
      - PORT=3000
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks: [appnet]

  nginx:
    image: nginx:alpine
    container_name: nginx
    depends_on:
      app-blue:
        condition: service_healthy
      app-green:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    restart: unless-stopped
    networks: [appnet]

networks:
  appnet:
    driver: bridge
